<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover" />
<meta name="theme-color" content="#05060d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="NEON PINBALL" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="format-detection" content="telephone=no" />
<title>NEON MICRO PINBALL</title>
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
<link rel="icon" href="./icons/icon-192.png" />
<link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="app">
    <canvas id="game" width="360" height="640"></canvas>

    <!-- Title overlay -->
    <div id="title" class="overlay">
      <div class="logo">
        <div class="logo-sub">N E O N</div>
        <div class="logo-main">MICRO PINBALL</div>
        <div class="logo-tag">tap to ignite the city</div>
      </div>
      <button id="btn-start" class="neon-btn">START</button>
    </div>

    <!-- Game Over overlay -->
    <div id="gameover" class="overlay hidden">
      <div class="go-title">GAME OVER</div>
      <div class="go-score"><span>SCORE</span><b id="go-score-val">0</b></div>
      <div class="go-score"><span>BEST</span><b id="go-best-val">0</b></div>
      <div id="go-newbest" class="go-newbest hidden">★ NEW RECORD ★</div>
      <button id="btn-restart" class="neon-btn">RETRY</button>
    </div>

    <!-- PWA install hint (一回だけ) -->
    <div id="install-hint" class="hint hidden">
      ホーム画面に追加すると全画面で遊べます<br/>
      <small>共有 → ホーム画面に追加</small>
      <button id="hint-close">×</button>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js').then(reg => {
          reg.update();
          reg.addEventListener('updatefound', () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener('statechange', () => {
              if (nw.state === 'activated') location.reload();
            });
          });
        }).catch(()=>{});
      });
    }
  </script>
</body>
</html>
